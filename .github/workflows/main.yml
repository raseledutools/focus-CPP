name: Build RasBlocker Pro (Nuitka High Speed)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install pywebview pynput nuitka

    - name: Build EXE with Nuitka
      # --standalone: সব লাইব্রেরি ভেতরে নিয়ে নেবে
      # --onefile: একটি মাত্র ফাইল বানাবে
      # --windows-disable-console: পেছনের কালো উইন্ডো বন্ধ করবে
      # --include-data-files: আপনার index.html-কে ভেতরে ঢুকিয়ে দেবে
      run: |
        python -m nuitka --standalone --onefile --windows-disable-console --include-data-files=index.html=index.html --output-dir=build_out main.py

    - name: Upload Fast EXE
      uses: actions/upload-artifact@v4
      with:
        name: RasBlockerPro-Nuitka-Fast
        path: build_out/main.exe
