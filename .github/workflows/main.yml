name: Build RasBlocker Pro (Python Hybrid)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Build Tools
      run: |
        python -m pip install --upgrade pip
        pip install pywebview pynput pyinstaller

    - name: Build Professional EXE
      # এখানে --add-data "index.html;." কমান্ডটি আপনার গিটহাবের index.html-কে EXE-র ভেতরে ঢুকিয়ে দেবে
      run: |
        pyinstaller --noconfirm --onefile --windowed --add-data "index.html;." --name "RasBlockerPro" main.py

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: RasBlockerPro-Standalone
        path: dist/RasBlockerPro.exe
