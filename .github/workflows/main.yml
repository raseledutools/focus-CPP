name: Build RasFocus Pure CPP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.3

    - name: Install WebView2 NuGet Package
      run: |
        nuget install Microsoft.Web.WebView2 -OutputDirectory packages

    - name: Build Application
      run: |
        msbuild RasFocus.sln /p:Configuration=Release /p:Platform=x64

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: RasFocus-Lite
        path: x64/Release/RasFocus.exe
