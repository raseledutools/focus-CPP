name: Build RasBlocker Pro (Nuitka Final)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install pywebview pynput nuitka

    - name: Build Super Fast EXE
      # --assume-yes-for-downloads যোগ করা হয়েছে যাতে গিটহাব অটোমেটিক পারমিশন দেয়
      run: |
        python -m nuitka --standalone --onefile --windows-disable-console --assume-yes-for-downloads --include-data-files=index.html=index.html --output-dir=build_out main.py

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: RasBlockerPro-Nuitka-Fast
        path: build_out/main.exe
