name: Build RasBlocker Pro

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # এই লাইনের ফলে আপনি গিটহাব থেকে ম্যানুয়ালিও বিল্ড স্টার্ট করতে পারবেন

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup MinGW (C++ Compiler)
      uses: egor-tensin/setup-gcc@v1
      with:
        version: latest
        platform: x64

    - name: Compile C++ Code
      # -static ফ্ল্যাগগুলো দেওয়া হয়েছে যাতে অন্য পিসিতে কোনো DLL ফাইল মিসিং না দেখায়
      run: |
        g++ main.cpp -o RasBlockerPro.exe -static -static-libgcc -static-libstdc++ -mwindows -ladvapi32 -lole32 -lshell32 -lshlwapi -luser32 -lversion -loleaut32

    - name: Package App into Zip
      # EXE এবং HTML ফাইলটিকে একটি জিপ ফাইলে প্যাক করা হচ্ছে
      run: |
        Compress-Archive -Path "RasBlockerPro.exe", "index.html" -DestinationPath "RasBlockerPro_App.zip"

    - name: Upload Final Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RasBlockerPro-Release
        path: RasBlockerPro_App.zip
