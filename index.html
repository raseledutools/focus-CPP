<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RasFocus - Adult Filter</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --clr-teal: #0ca8b0;
            --clr-teal-hover: #1eb9c3;
            --clr-dark: #323232;
            --clr-gray-text: #787878;
            --clr-border: #dcdce6;
            --clr-white: #ffffff;
            --clr-bg: #f8fafc;
            --clr-bg-hover: #ebf8fa;
            --clr-red: #e74c3c;
            --clr-green: #5aaa14;
            --clr-card-bg: #fafcff;
            --clr-link: #0066cc;
            --clr-overlay: rgba(0, 0, 0, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--clr-bg); color: var(--clr-dark); overflow-x: hidden; }
        button { cursor: pointer; border: none; outline: none; background: none; }
        input, select { font-family: inherit; outline: none; }

        /* App Container */
        .app-container { max-width: 850px; margin: 0 auto; background: var(--clr-bg); min-height: 100vh; position: relative; }

        /* Header Tabs */
        .tab-header { background: var(--clr-white); padding: 10px 20px 0; display: flex; gap: 10px; border-bottom: 1px solid var(--clr-border); }
        .tab-btn { padding: 10px 30px; border-radius: 6px 6px 0 0; font-weight: bold; font-size: 15px; color: var(--clr-gray-text); background: #f5f5f5; transition: 0.2s; }
        .tab-btn:hover { background: #e6e6e6; }
        .tab-btn.active { background: var(--clr-teal); color: var(--clr-white); }

        /* Main Content */
        .content { padding: 20px 40px; }

        /* Top Controls Row */
        .top-controls { display: flex; align-items: center; gap: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--clr-border); margin-bottom: 20px; }
        .btn-start { background: var(--clr-green); color: white; font-weight: bold; font-size: 16px; padding: 8px 25px; border-radius: 4px; transition: 0.3s; }
        .btn-start:hover { opacity: 0.9; }
        .btn-start.active { background: var(--clr-red); }
        
        .control-group { display: flex; align-items: center; gap: 8px; }
        .control-group label { font-weight: bold; font-size: 15px; color: var(--clr-dark); }
        .custom-select { padding: 6px 12px; border: 1.5px solid var(--clr-border); border-radius: 4px; font-size: 15px; background: var(--clr-white); color: var(--clr-dark); cursor: pointer; }
        .custom-select:hover { background: var(--clr-bg-hover); }

        /* Two Column Grid */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 30px; }

        /* Checkboxes */
        .checkbox-item { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 15px; cursor: pointer; }
        .cb-box { width: 18px; height: 18px; border: 1.5px solid var(--clr-border); border-radius: 3px; display: flex; align-items: center; justify-content: center; background: var(--clr-white); transition: 0.2s; flex-shrink: 0; margin-top: 2px;}
        .cb-box i { font-size: 12px; color: white; display: none; }
        .checkbox-item input { display: none; }
        .checkbox-item input:checked + .cb-box { background: var(--clr-teal); border-color: var(--clr-teal); }
        .checkbox-item input:checked + .cb-box i { display: block; }
        .checkbox-item.disabled .cb-box { background: var(--clr-gray-text); border-color: var(--clr-gray-text); }
        .cb-text { font-size: 15px; color: var(--clr-dark); font-weight: 600; }
        .cb-sub { font-size: 11px; color: var(--clr-gray-text); display: block; margin-top: 4px; font-weight: normal;}

        /* Custom Keywords */
        .custom-section h3 { font-size: 16px; margin-bottom: 15px; color: var(--clr-dark); }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-kw { flex-grow: 1; padding: 6px 12px; border: 1.5px solid var(--clr-border); border-radius: 4px; font-size: 15px; }
        .input-kw:focus { border-color: var(--clr-teal); }
        .btn-add { background: var(--clr-teal); color: white; font-weight: bold; padding: 6px 20px; border-radius: 4px; }
        .btn-add:hover { background: var(--clr-teal-hover); }
        
        .kw-table { border: 1.5px solid var(--clr-border); border-radius: 4px; background: var(--clr-white); height: 100px; overflow-y: auto; }
        .kw-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border-bottom: 1px solid var(--clr-border); font-size: 15px; }
        .kw-item:last-child { border-bottom: none; }
        .kw-delete { color: var(--clr-gray-text); cursor: pointer; }
        .kw-delete:hover { color: var(--clr-red); }

        /* Bottom Section Divider */
        .divider { height: 1px; background: var(--clr-border); margin: 20px 0; }

        /* Streak Card */
        .streak-card { background: var(--clr-card-bg); border: 1.5px solid var(--clr-border); border-radius: 8px; padding: 20px; display: flex; gap: 20px; align-items: center; }
        .star-icon { font-size: 40px; color: var(--clr-teal); }
        .streak-info h4 { font-size: 16px; margin-bottom: 2px; }
        .streak-info .date { font-size: 13px; color: var(--clr-gray-text); margin-bottom: 5px; }
        .streak-info .days { font-size: 32px; font-weight: bold; color: var(--clr-teal); line-height: 1; margin-bottom: 5px;}
        .streak-info .msg { font-size: 13px; color: var(--clr-green); }

        /* Quick Links */
        .quick-links { display: flex; gap: 40px; margin-top: 30px; }
        .q-link { color: var(--clr-link); font-weight: bold; font-size: 15px; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .q-link:hover { color: var(--clr-teal-hover); }

        /* Modal Overlay */
        .modal-overlay { position: fixed; inset: 0; background: var(--clr-overlay); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; visibility: hidden; transition: 0.2s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box { background: var(--clr-bg); border: 1.5px solid var(--clr-border); border-radius: 8px; width: 400px; padding: 25px; text-align: center; }
        .modal-title { font-size: 20px; font-weight: bold; margin-bottom: 25px; color: var(--clr-dark); }
        
        .time-picker { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px; }
        .spinner-group { display: flex; align-items: center; }
        .spinner-lbl { font-weight: bold; margin-right: 10px; }
        .spin-btn { width: 32px; height: 36px; border: 1.5px solid var(--clr-border); background: #f5f5f5; display: flex; justify-content: center; align-items: center; font-size: 12px; }
        .spin-btn:hover { background: #e0e0e0; }
        .spin-val { width: 50px; height: 36px; border-top: 1.5px solid var(--clr-border); border-bottom: 1.5px solid var(--clr-border); display: flex; justify-content: center; align-items: center; font-weight: bold; background: white; }
        
        .modal-actions { display: flex; justify-content: center; gap: 15px; }
        .btn-cancel { padding: 10px 25px; border: 1.5px solid var(--clr-border); border-radius: 4px; font-weight: bold; background: white; }
        .btn-cancel:hover { background: #f5f5f5; }
        .btn-confirm { padding: 10px 25px; border-radius: 4px; font-weight: bold; background: var(--clr-teal); color: white; }
        .btn-confirm:hover { background: var(--clr-teal-hover); }

        .pass-input { width: 100%; padding: 10px; border: 1.5px solid var(--clr-border); border-radius: 4px; font-size: 24px; text-align: center; margin-bottom: 25px; letter-spacing: 5px;}
        .pass-input:focus { border-color: var(--clr-teal); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tab-header">
        <button class="tab-btn active">Safe Browsing</button>
        <button class="tab-btn">AI Filter</button>
        <button class="tab-btn">Strict Protocols</button>
    </div>

    <div class="content" id="tab-safe-browsing">
        
        <div class="top-controls">
            <button class="btn-start" id="startFocusBtn" onclick="toggleFocus()">Start Focus</button>
            
            <div class="control-group" style="margin-left: 10px;">
                <label>Mode:</label>
                <select class="custom-select" id="controlMode">
                    <option>Self Control</option>
                    <option>Friend Control</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>Religion:</label>
                <select class="custom-select">
                    <option>Muslim</option>
                    <option>Hindu</option>
                    <option>Christian</option>
                    <option>Universal</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>Lang:</label>
                <select class="custom-select">
                    <option>Bangla</option>
                    <option>English</option>
                </select>
            </div>
        </div>

        <div class="grid-2">
            <div class="checkbox-list">
                <label class="checkbox-item">
                    <input type="checkbox" checked id="cbWeb">
                    <div class="cb-box"><i class="fa-solid fa-check"></i></div>
                    <span class="cb-text">Block Adult Websites</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" checked id="cbHardcore">
                    <div class="cb-box"><i class="fa-solid fa-check"></i></div>
                    <span class="cb-text">Block Hardcore Keywords</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" checked id="cbRomantic">
                    <div class="cb-box"><i class="fa-solid fa-check"></i></div>
                    <span class="cb-text">Block Romantic/Softcore</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" checked id="cbSocial">
                    <div class="cb-box"><i class="fa-solid fa-check"></i></div>
                    <span class="cb-text">Block Facebook/YT Shorts & Reels</span>
                </label>
            </div>

            <div class="custom-section">
                <h3>Custom Keywords:</h3>
                <div class="input-group">
                    <input type="text" class="input-kw" id="kwInput" placeholder="e.g. badword" onkeypress="handleKwEnter(event)">
                    <button class="btn-add" onclick="addKeyword()">+ Add</button>
                </div>
                <div class="kw-table" id="kwTable">
                    </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="grid-2">
            <div class="streak-card">
                <i class="fa-solid fa-star star-icon"></i>
                <div class="streak-info">
                    <h4>Clean Streak</h4>
                    <div class="date" id="todayDate">Loading...</div>
                    <div class="days">12 Days</div>
                    <div class="msg">Keep up the great work!</div>
                </div>
            </div>

            <div class="checkbox-list">
                <label class="checkbox-item">
                    <input type="checkbox" id="cb24Lock">
                    <div class="cb-box"><i class="fa-solid fa-check"></i></div>
                    <div>
                        <span class="cb-text">24-Hour Lockdown Mode</span>
                        <span class="cb-sub">Force Focus for 24h. Cannot be undone.</span>
                    </div>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="cbPeriodic">
                    <div class="cb-box"><i class="fa-solid fa-check"></i></div>
                    <div>
                        <span class="cb-text">Periodic Religious Popups</span>
                        <span class="cb-sub">Show fullscreen religious quotes every 25 mins.</span>
                    </div>
                </label>
            </div>
        </div>

        <div class="quick-links">
            <a href="#" class="q-link">Go to AI Filter Settings <i class="fa-solid fa-arrow-right"></i></a>
            <a href="#" class="q-link">Go to Strict Protocols <i class="fa-solid fa-arrow-right"></i></a>
        </div>

    </div>
</div>

<div class="modal-overlay" id="timeModal">
    <div class="modal-box">
        <div class="modal-title">SET FOCUS DURATION</div>
        
        <div class="time-picker">
            <div class="spinner-group">
                <span class="spinner-lbl">Hours:</span>
                <button class="spin-btn" onclick="changeTime('h', -1)"><i class="fa-solid fa-chevron-down"></i></button>
                <div class="spin-val" id="valHours">1</div>
                <button class="spin-btn" onclick="changeTime('h', 1)"><i class="fa-solid fa-chevron-up"></i></button>
            </div>
            <div class="spinner-group">
                <span class="spinner-lbl">Mins:</span>
                <button class="spin-btn" onclick="changeTime('m', -5)"><i class="fa-solid fa-chevron-down"></i></button>
                <div class="spin-val" id="valMins">0</div>
                <button class="spin-btn" onclick="changeTime('m', 5)"><i class="fa-solid fa-chevron-up"></i></button>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('timeModal')">Cancel</button>
            <button class="btn-confirm" onclick="confirmStartFocus()">Start Focus</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="passModal">
    <div class="modal-box">
        <div class="modal-title" id="passTitle">ENTER FRIEND'S PASSWORD</div>
        <input type="password" class="pass-input" id="passInput" placeholder="••••••••">
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('passModal')">Cancel</button>
            <button class="btn-confirm" onclick="confirmStopFocus()">Confirm</button>
        </div>
    </div>
</div>

<script>
    // Set Today's Date
    const options = { month: 'long', day: 'numeric', year: 'numeric' };
    document.getElementById('todayDate').innerText = new Date().toLocaleDateString('en-US', options);

    let isFocusActive = false;
    let hours = 1, mins = 0;
    let customKeywords = []; 

    // ফ্রন্টএন্ড থেকে সমস্ত সেটিংস একসাথে নেওয়ার ফাংশন
    function getSettings() {
        return {
            cbWeb: document.getElementById('cbWeb').checked,
            cbHardcore: document.getElementById('cbHardcore').checked,
            cbRomantic: document.getElementById('cbRomantic').checked,
            cbSocial: document.getElementById('cbSocial').checked,
            controlMode: document.getElementById('controlMode').value,
            customKeywords: customKeywords
        };
    }

    // Python (pywebview) এর কাছে ডেটা পাঠানো
    function saveSettings() {
        if (window.pywebview) {
            window.pywebview.api.update_settings(getSettings());
        }
    }

    // Focus Toggle Logic (Start / Stop)
    function toggleFocus() {
        if (!isFocusActive) {
            if (document.getElementById('cb24Lock').checked) {
                confirmStartFocus(true);
            } else {
                document.getElementById('timeModal').classList.add('active');
            }
        } else {
            const mode = document.getElementById('controlMode').value;
            if (mode === "Friend Control") {
                document.getElementById('passTitle').innerText = "ENTER PASSWORD TO STOP";
                document.getElementById('passModal').classList.add('active');
                document.getElementById('passInput').focus();
            } else {
                window.stopFocusUI();
            }
        }
    }

    // স্টার্ট করার মূল ফাংশন (Python কে সিগন্যাল পাঠানো)
    function confirmStartFocus(is24h = false) {
        closeModal('timeModal');
        isFocusActive = true;
        const btn = document.getElementById('startFocusBtn');
        
        if (is24h) {
            btn.innerText = `Locked (24h 0m)`;
            if (window.pywebview) window.pywebview.api.start_focus({ is24h: true });
        } else {
            btn.innerText = `Locked (${hours}h ${mins}m)`;
            let durationMs = (hours * 3600000) + (mins * 60000); 
            if (window.pywebview) window.pywebview.api.start_focus({ is24h: false, durationMs: durationMs });
        }
        
        btn.classList.add('active');
        disableCheckboxes(true);
        saveSettings(); 
    }

    // পাসওয়ার্ড দিয়ে স্টপ করা
    function confirmStopFocus() {
        if (document.getElementById('passInput').value !== '') {
            closeModal('passModal');
            document.getElementById('passInput').value = '';
            window.stopFocusUI();
        }
    }

    // ফোকাস স্টপ হলে UI আগের অবস্থায় নিয়ে আসা (Python সরাসরি একে কল করতে পারবে)
    window.stopFocusUI = function() {
        isFocusActive = false;
        const btn = document.getElementById('startFocusBtn');
        btn.innerText = "Start Focus";
        btn.classList.remove('active');
        document.getElementById('cb24Lock').checked = false; 
        disableCheckboxes(false);
        if (window.pywebview) window.pywebview.api.stop_focus();
    };

    // ফোকাস চলাকালীন চেকবক্স লক করা
    function disableCheckboxes(disable) {
        const cbs = document.querySelectorAll('.checkbox-item input[type="checkbox"]:not(#cb24Lock)');
        cbs.forEach(cb => {
            if (disable) {
                cb.parentElement.classList.add('disabled');
                cb.disabled = true;
            } else {
                cb.parentElement.classList.remove('disabled');
                cb.disabled = false;
            }
        });
    }

    // Modal Logic
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    // টাইমার চেঞ্জ করা
    function changeTime(type, val) {
        if (type === 'h') {
            hours += val;
            if(hours < 0) hours = 0; if(hours > 23) hours = 23;
            document.getElementById('valHours').innerText = hours;
        } else {
            mins += val;
            if(mins < 0) mins = 55; if(mins > 55) mins = 0;
            document.getElementById('valMins').innerText = mins;
        }
    }

    // Custom Keyword অ্যাড করা
    function addKeyword() {
        const input = document.getElementById('kwInput');
        const val = input.value.trim();
        if (val && !customKeywords.includes(val)) {
            customKeywords.push(val);
            renderKeywords();
            input.value = '';
            saveSettings(); 
        }
    }

    // Custom Keyword রিমুভ করা
    function removeKeyword(index) {
        customKeywords.splice(index, 1);
        renderKeywords();
        saveSettings();
    }

    // Keywords UI তে দেখানো
    function renderKeywords() {
        const table = document.getElementById('kwTable');
        table.innerHTML = '';
        customKeywords.forEach((kw, index) => {
            table.innerHTML += `<div class="kw-item"><span>${kw}</span> <i class="fa-solid fa-xmark kw-delete" onclick="removeKeyword(${index})"></i></div>`;
        });
    }

    function handleKwEnter(e) { if (e.key === 'Enter') addKeyword(); }

    // 24 Hour Lock Warning
    document.getElementById('cb24Lock').addEventListener('change', function(e) {
        if(this.checked) {
            if(!confirm("Are you sure? This will lock your browser safety for 24 hours and CANNOT be undone.")) {
                this.checked = false;
            } else {
                confirmStartFocus(true);
            }
        }
    });

    // যেকোনো চেকবক্স বা ড্রপডাউন পরিবর্তন হলে অটোমেটিক সেভ করা
    document.querySelectorAll('input[type="checkbox"]:not(#cb24Lock), select').forEach(el => {
        el.addEventListener('change', saveSettings);
    });

    // পাইথন ইঞ্জিন (pywebview) রেডি হওয়ার পর ডিফল্ট সেটিংস পাঠানো
    window.addEventListener('pywebviewready', function() {
        saveSettings();
    });
</script>

</body>
</html>
